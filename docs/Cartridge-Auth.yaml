openapi: 3.0.0
info:
  description: This is the API documentation for the Authentication endpoints of the Cartridge Web and Mobile Application.
  version: 1.0.0
  title: Cartridge - Auth
  contact:
    email: Julianbir123@gmail.com

  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Auth
    description: Authentication endpoint

paths:
  /login:
    post:
      tags:
        - Auth
      summary: Logs into Cartridge Application
      operationId: doLogin
      description: Logs into Cartridge Application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '200':
          description: Login Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                  username:
                    type: string
                  token:
                    type: string
        '401':
          description: Unauthorized

  /register:
    post:
      tags:
        - Auth
      summary: Register new user to Cartridge Application
      operationId: doRegister
      description: Register new user to Cartridge Application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
      responses:
        '201':
          description: Registration Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                  username:
                    type: string
                  token:
                    type: string
        '400':
          description: Bad Request

  /logout:
    post:
      tags:
        - Auth
      summary: Log user out of account on Cartridge Application
      operationId: doLogout
      description: Log user out of account on Cartridge Application
      responses:
        '200':
          description: Logout Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          description: Bad Request

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Login:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "gamer"
        password:
          type: string
          example: "secret"

    Register:
      type: object
      required:
        - firstName
        - lastName
        - email
        - username
        - password
      properties:
        firstName:
          type: string
          example: "Adam"
        lastName:
          type: string
          example: "Smith"
        email:
          type: string
          example: "example@email.com"
        username:
          type: string
          example: "gamer"
        password:
          type: string
          example: "secret"

servers:
  - url: http://www.cartridgeapp.fun

openapi: 3.0.0
info:
  description: API documentation for the Authentication and account/profile endpoints of the Cartridge Web and Mobile Application.
  version: 1.0.0
  title: Cartridge - Auth
  contact:
    email: Julianbir123@gmail.com

  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Auth
    description: Login, registration, and email/password recovery
  - name: Profile
    description: Reading and editing the logged-in user's own account

paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log into Cartridge
      operationId: doLogin
      description: >
        Logs a user in by email and password. If the account exists but
        hasn't been verified yet, this also generates a fresh verification
        token and re-sends the verification email as a side effect of the
        failed attempt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing email/password, account not found, or wrong password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Account exists but is not yet verified. A new verification email was just sent (or, if delivery failed, a message saying so).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '500':
          description: Server error, or the server is missing its JWT signing secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new Cartridge account
      operationId: doRegister
      description: >
        Creates the account (unverified) and sends a verification email.
        Does not log the user in or return a token — they must verify their
        email and then log in separately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Account added to DB."
                  email:
                    type: string
                    example: "example@email.com"
        '400':
          description: Missing fields, passwords don't match, username taken, or an account already exists for this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Log out of Cartridge
      operationId: doLogout
      description: Stateless — the server holds no session to invalidate. Exists so clients have a consistent endpoint to call while clearing their own locally-stored token.
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/auth/resendEmailVerification:
    post:
      tags:
        - Auth
      summary: Resend the registration verification email
      operationId: resendEmailVerification
      description: >
        Generates a fresh verification token and re-sends the verification
        email. Always responds successfully if the account doesn't exist or
        is blank, so the response can't be used to check whether an email is
        registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: "example@email.com"
      responses:
        '200':
          description: Verification email sent (or silently a no-op if no account exists for this email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing/blank email, or the account is already verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/auth/forgotPassword:
    post:
      tags:
        - Auth
      summary: Request a password reset email
      operationId: doForgotPassword
      description: >
        Generates a reset token (10 minute expiry) and emails a reset link
        if an account exists for the given email. Always responds
        successfully either way, so the response can't be used to check
        whether an email is registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: "example@email.com"
      responses:
        '200':
          description: No account exists for this email (reported the same as success, on purpose)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '201':
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '400':
          description: Missing email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '502':
          description: Token was generated, but the email failed to send
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'

  /api/auth/resetPassword:
    post:
      tags:
        - Auth
      summary: Reset a password using an emailed token
      operationId: doResetPassword
      description: >
        The token comes from the emailed reset link and is passed as a
        query parameter, not in the request body. Token is single-use and
        expires 10 minutes after being generated. The new password may not
        match the account's current password.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newPassword
                - confirmNewPassword
              properties:
                newPassword:
                  type: string
                  example: "NewSecret1!"
                confirmNewPassword:
                  type: string
                  example: "NewSecret1!"
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing fields, passwords don't match, token invalid/expired, or the new password matches the previous one
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/auth/verifyEmail:
    get:
      tags:
        - Auth
      summary: Confirm an account's email address
      operationId: doVerifyEmail
      description: >
        The token comes from the emailed verification link and is passed as
        a query parameter. Handles two cases with the same token field:
        first-time registration verification, and confirming a pending
        email change made via PUT /api/auth/account.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing token, or the token is invalid/expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/auth/me:
    get:
      tags:
        - Profile
      summary: Get the logged-in user's own profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          description: Token did not contain a user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/auth/checkUsername:
    get:
      tags:
        - Profile
      summary: Check whether a username is available
      operationId: checkUsername
      description: Case-insensitive match against existing usernames. Treats the caller's own current username as available.
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsernameAvailabilityResponse'
        '400':
          description: Missing or blank username
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/auth/profile:
    put:
      tags:
        - Profile
      summary: Update the logged-in user's profile picture and bio
      operationId: updateProfile
      description: >
        Only handles profilePicture and bio — for username, email, or
        password changes use PUT /api/auth/account instead.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newProfilePicture:
                  type: string
                  format: uri
                  nullable: true
                newBio:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Profile updated successfully"
                  user:
                    type: object
                    properties:
                      _id:
                        type: string
                      profilePicture:
                        type: string
                        format: uri
                        nullable: true
                      bio:
                        type: string
                        nullable: true
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  debugError:
                    type: string

  /api/auth/account:
    put:
      tags:
        - Profile
      summary: Update the logged-in user's username, email, and/or password
      operationId: updateAccount
      description: >
        Only send the fields being changed. If newPassword is set,
        currentPassword must also be sent and correct. If newEmail differs
        from the account's current email, the change isn't applied
        immediately — it's stored as pendingEmail, a re-verification email
        is sent to the new address, and the previous email stays valid for
        login until the new one is confirmed via GET /api/auth/verifyEmail.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountUpdateResponse'
        '400':
          description: Username/email already taken, current password missing or incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

    delete:
      tags:
        - Profile
      summary: Delete the logged-in user's account
      operationId: deleteAccount
      description: Requires the current password. Deletes the account; does not itself cascade-delete their GameUserEntries/Lists.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
              properties:
                currentPassword:
                  type: string
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing or incorrect current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: "example@email.com"
        password:
          type: string
          example: "secret"

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: "Login successful."
        token:
          type: string
          description: >
            Raw JWT (no "Bearer " prefix included). Expires in 20 minutes,
            but every authenticated request that carries a valid token gets
            a freshly-signed 20-minute token back in the X-Refreshed-Token
            response header — a sliding session that only truly expires
            after 20 minutes of inactivity.
        user:
          type: object
          properties:
            id:
              type: string
              example: "64f1a2b3c4d5e6f7a8b9c0d2"
            email:
              type: string
              example: "example@email.com"

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
        - confirmPassword
      properties:
        username:
          type: string
          example: "gamer"
        email:
          type: string
          example: "example@email.com"
        password:
          type: string
          example: "secret"
        confirmPassword:
          type: string
          example: "secret"

    MeResponse:
      type: object
      properties:
        username:
          type: string
          example: "gamer"
        email:
          type: string
          example: "example@email.com"
        pendingEmail:
          type: string
          nullable: true
          example: null
        profilePicture:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
          nullable: true

    AccountUpdateRequest:
      type: object
      properties:
        newUsername:
          type: string
        newEmail:
          type: string
        currentPassword:
          type: string
          description: Required if newPassword is set.
        newPassword:
          type: string
        confirmNewPassword:
          type: string
          description: Required if newPassword is set (not currently cross-checked against newPassword server-side).

    AccountUpdateResponse:
      type: object
      properties:
        message:
          type: string
          example: "Account settings updated successfully"
        pendingEmail:
          type: string
          nullable: true
          description: Set when newEmail was provided — the change won't take effect until this address is verified.
        user:
          type: object
          properties:
            _id:
              type: string
            username:
              type: string
            email:
              type: string
              description: The account's current (still-confirmed) email — unchanged until pendingEmail is verified.

    UsernameAvailabilityResponse:
      type: object
      properties:
        available:
          type: boolean
        message:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    SuccessMessageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

servers:
  - url: https://cartridgeapp.fun

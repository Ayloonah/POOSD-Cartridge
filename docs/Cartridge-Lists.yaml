openapi: 3.0.0
info:
  description: API documentation for the Lists endpoints of the Cartridge Web and Mobile Application.
  version: 1.0.0
  title: Cartridge - Lists
  contact:
    email: Julianbir123@gmail.com

  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Lists
    description: User-created game list management endpoints

paths:
  /api/lists:
    post:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Create a list
      operationId: createList
      description: >
        Creates the list and, in the same request, assigns it to every
        game entry named in entryIds (adds this list's id to each of
        those GameUserEntry documents' listIds array). entryIds may be
        empty or omitted — a list can be created with no games in it. Every
        id in entryIds must already be one of the caller's own collection
        entries, or the whole request is rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListRequest'
      responses:
        '201':
          description: List created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "List created successfully"
                  list:
                    $ref: '#/components/schemas/List'
                  assignedEntryIds:
                    type: array
                    description: The deduplicated entryIds that were actually assigned.
                    items:
                      type: string
        '400':
          description: Missing/blank name, entryIds not an array, or one of the entryIds is malformed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: One or more entryIds don't belong to the caller's own collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Get all lists for the logged-in user
      operationId: getLists
      description: Sorted by most-recently-updated first.
      responses:
        '200':
          description: Lists retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/List'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/lists/{listId}:
    parameters:
      - name: listId
        in: path
        required: true
        schema:
          type: string

    put:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Rename a list and/or change its cover image
      operationId: updateList
      description: >
        Only touches name and/or coverImage — game membership is NOT
        managed here. To add or remove a game from this list, use
        POST/DELETE /api/user-game-entries/lists/{listId}/games/{gameId}
        instead. PATCH on this same path does exactly the same thing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateListRequest'
      responses:
        '200':
          description: List updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "List updated successfully"
                  list:
                    $ref: '#/components/schemas/List'
        '400':
          description: Invalid list ID, no fields provided, blank name, or coverImage sent as something other than a string/null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: List not found (or not owned by the caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Rename a list and/or change its cover image (identical to PUT on this path)
      operationId: patchList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateListRequest'
      responses:
        '200':
          description: List updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "List updated successfully"
                  list:
                    $ref: '#/components/schemas/List'
        '400':
          description: Invalid list ID, no fields provided, blank name, or coverImage sent as something other than a string/null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: List not found (or not owned by the caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Delete a list
      operationId: deleteList
      description: Deletes the list, and removes its id from the listIds array of any GameUserEntry documents that referenced it. Games themselves aren't affected.
      responses:
        '200':
          description: List deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid list ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: List not found (or not owned by the caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    List:
      type: object
      description: Never includes userId — lists are only ever returned for their owner in the first place.
      properties:
        _id:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        name:
          type: string
          example: "Played"
        isPublic:
          type: boolean
          default: false
        coverImage:
          type: string
          format: uri
          nullable: true
          description: Set by the client (e.g. to the cover of the first game added to the list) — not derived server-side.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateListRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Played"
        isPublic:
          type: boolean
          default: false
        coverImage:
          type: string
          format: uri
          nullable: true
        entryIds:
          type: array
          description: GameUserEntry ids (from the caller's own collection) to assign to this new list. Optional — omit or send an empty array for a list with no games.
          items:
            type: string

    UpdateListRequest:
      type: object
      description: At least one of name or coverImage must be provided.
      properties:
        name:
          type: string
          example: "Played"
        coverImage:
          type: string
          format: uri
          nullable: true

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

servers:
  - url: https://cartridgeapp.fun

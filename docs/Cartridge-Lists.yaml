openapi: 3.0.0
info:
  description: API documentation for the Lists endpoints of the Cartridge Web and Mobile Application.
  version: 1.0.0
  title: Cartridge - Lists
  contact:
    email: Julianbir123@gmail.com

  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Lists
    description: User-created game list management endpoints

paths:
  /api/lists:
    post:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Create a list
      operationId: createList
      description: >
        Creates the list and, in the same request, assigns it to every
        game entry named in entryIds (adds this list's id to each of
        those GameUserEntry documents' listIds array). entryIds may be
        empty — a list can be created with no games in it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListInput'
      responses:
        '201':
          description: List created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/List'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
    get:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Get all lists for the logged-in user
      operationId: getLists
      responses:
        '200':
          description: Lists retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/List'

  /api/lists/{listId}:
    parameters:
      - name: listId
        in: path
        required: true
        schema:
          type: string

    put:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Update a list's name, cover image, and game membership
      operationId: updateList
      description: >
        Renames/re-covers the list and does a full resync of membership:
        entryIds is treated as the complete membership list after this
        request — this list's id is added to the listIds of any
        newly-included entries, and removed from any previously-member
        entries no longer present in entryIds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListInput'
      responses:
        '200':
          description: List updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/List'
        '404':
          description: List not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

    delete:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Delete a list
      operationId: deleteList
      description: Deletes the list, and removes its id from the listIds array of any GameUserEntry documents that referenced it. Games themselves aren't affected.
      responses:
        '200':
          description: List deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: List not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    List:
      type: object
      properties:
        listId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        userId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d2"
        name:
          type: string
          example: "Played"
        coverImage:
          type: string
          format: uri
          nullable: true
          description: Defaults (client-side) to the cover of the first game added to the list.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Played"
        coverImage:
          type: string
          format: uri
          nullable: true
        entryIds:
          type: array
          description: The complete set of GameUserEntry ids that should belong to this list after this request. Optional — omit or send an empty array for a list with no games.
          items:
            type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

servers:
  - url: http://www.cartridgeapp.fun

openapi: 3.0.0
info:
  description: API documentation for the Games endpoints of the Cartridge Web and Mobile Application — searching RAWG and caching games into our own database.
  version: 1.0.0
  title: Cartridge - Games
  contact:
    email: Julianbir123@gmail.com

  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Games
    description: Game search and caching endpoints

paths:
  /api/games/search:
    get:
      tags:
        - Games
      summary: Search for games
      operationId: searchGames
      description: >
        Searches RAWG directly (does not currently check our own cached
        `Game` collection first). Results have no id field of their own —
        cache one via POST /games/rawg/{rawgId} to get a usable gameId
        before referencing it in a collection entry.
      parameters:
        - name: search
          in: query
          required: true
          description: Search term.
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  next:
                    type: string
                    nullable: true
                  previous:
                    type: string
                    nullable: true
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameSearchResult'
        '400':
          description: Missing search term
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Server error, or RAWG_API_KEY is missing/RAWG request failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/games/rawg/{rawgId}:
    parameters:
      - name: rawgId
        in: path
        required: true
        schema:
          type: integer

    get:
      tags:
        - Games
      summary: Get one game's details directly from RAWG
      operationId: getGameByRawgId
      description: Fetches and formats a single game from RAWG. Does not save it to our database, and the result has no id field — use the POST version of this endpoint for that.
      responses:
        '200':
          description: Game details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSearchResult'
        '400':
          description: Invalid RAWG game ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

    post:
      tags:
        - Games
      summary: Cache a RAWG game into our database
      operationId: saveGame
      description: >
        Requires authentication. Fetches the game from RAWG and upserts it
        into our own Game collection (matched on rawgId), returning the
        saved document with its own _id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Game saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  game:
                    $ref: '#/components/schemas/Game'
        '400':
          description: Invalid RAWG game ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/games/manual:
    post:
      tags:
        - Games
      summary: Create a game manually
      operationId: createManualGame
      description: >
        For games not found via RAWG search. Only name is required —
        everything else defaults to empty. The created game's source is set
        to "manual" (vs. "rawg" for cached search results).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualGameInput'
      responses:
        '201':
          description: Manual game created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Manual game created successfully"
                  game:
                    $ref: '#/components/schemas/Game'
        '400':
          description: Missing/blank name, or genres/platforms/developers sent as something other than an array
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/games/{gameId}:
    get:
      tags:
        - Games
      summary: Get a saved game by its own ID
      operationId: getSavedGame
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Game found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          description: Game not found (also returned for a malformed gameId)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

components:
  schemas:
    GameSearchResult:
      type: object
      description: A formatted RAWG result. Has no id field — cache it (POST /games/rawg/{rawgId}) to get one.
      properties:
        rawgId:
          type: integer
          example: 3498
        name:
          type: string
          example: "Grand Theft Auto V"
        coverImage:
          type: string
          format: uri
          nullable: true
        genres:
          type: array
          items:
            type: string
        platforms:
          type: array
          items:
            type: string
        releaseDate:
          type: string
          format: date
          nullable: true
        developers:
          type: array
          items:
            type: string
        description:
          type: string

    Game:
      type: object
      description: A game as stored in our own database.
      properties:
        _id:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0e1"
        rawgId:
          type: integer
          nullable: true
          description: Only present for games cached from RAWG; absent for manually-created games.
          example: 3498
        source:
          type: string
          enum: [rawg, manual]
          default: rawg
        name:
          type: string
          example: "Grand Theft Auto V"
        coverImage:
          type: string
          format: uri
          nullable: true
        genres:
          type: array
          items:
            type: string
        platforms:
          type: array
          items:
            type: string
        releaseDate:
          type: string
          format: date
          nullable: true
        developers:
          type: array
          items:
            type: string
        description:
          type: string
        cachedAt:
          type: string
          format: date-time

    ManualGameInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        coverImage:
          type: string
          format: uri
          nullable: true
        genres:
          type: array
          items:
            type: string
        platforms:
          type: array
          items:
            type: string
        releaseDate:
          type: string
          format: date
          nullable: true
        developers:
          type: array
          items:
            type: string
        description:
          type: string

servers:
  - url: https://cartridgeapp.fun
